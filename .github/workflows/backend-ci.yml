name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: laboratorio
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d laboratorio"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -U pip
          pip install -e .
          pip install pytest httpx

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/laboratorio
        run: alembic upgrade head

      - name: Seed database
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/laboratorio
        run: python seed.py

      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/laboratorio
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Health check
        run: curl -f http://localhost:8000/health

      - name: OpenAPI schema disponible
        run: curl -f http://localhost:8000/openapi.json

      - name: OpenAPI contiene endpoint stats
        run: |
          curl -s http://localhost:8000/openapi.json | grep '/organizations/{organization_id}/stats'

      - name: Login y captura de token
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8000/auth/login \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=superadmin@lab.com&password=changeme123" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Listar organizaciones
        run: |
          curl -f \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8000/organizations

      - name: Obtener organization_id
        run: |
          ORG_ID=$(curl -s \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8000/organizations \
            | python3 -c "import sys, json; print(json.load(sys.stdin)[0]['id'])")
          echo "ORG_ID=$ORG_ID" >> $GITHUB_ENV

      - name: Groups tree de la organización
        run: |
          curl -f \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8000/organizations/$ORG_ID/groups/tree

      - name: Stats de organización válida
        run: |
          curl -f \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8000/organizations/$ORG_ID/stats

      - name: Stats devuelve 404 si la organización no existe
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8000/organizations/11111111-1111-1111-1111-111111111111/stats)
          test "$STATUS" = "404"
